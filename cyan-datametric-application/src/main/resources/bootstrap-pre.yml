spring:
  config:
    import:
      - "nacos:arch-base.yaml?group=DEFAULT_GROUP&namespace=pre"
      - "nacos:cyan-datametric.yaml?group=DEFAULT_GROUP&namespace=pre"
  cloud:
    nacos:
      server-addr: 10.0.0.2:8848
      username: nacos
      password: nacos
      config:
        file-extension: yaml
        namespace: pre
      discovery:
        ephemeral: true
        namespace: pre
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123456
    url: jdbc:mysql://10.0.0.2:3306/cyan_datametric

datametric:
  default-datasource: cyan_iceberg

server:
  port: 8080
